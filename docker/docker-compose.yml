services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ebookofcode
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
  ministack:
    image: nahuelnucera/ministack:latest
    container_name: ministack
    ports:
      - "4566:4566"
    environment:
      - LOG_LEVEL=INFO
      - S3_PERSIST=0
    volumes:
      - ./data/s3:/tmp/ministack-data/s3
      - /var/run/docker.sock:/var/run/docker.sock
